<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YouKe Karaoke - Room {{ code }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/static/style.css">

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>

.sidebar {
    display:flex;
    flex-direction:column;
    height:calc(100vh - 120px);
}

.now-playing-box{
    position:sticky;
    top:0;
    z-index:10;
}

.queue-scroll{
    overflow-y:auto;
    padding-right:6px;
}

.queue-scroll::-webkit-scrollbar{
    width:10px;
}

.queue-scroll::-webkit-scrollbar-track{
    background:rgba(255,255,255,0.05);
    border-radius:999px;
}

.queue-scroll::-webkit-scrollbar-thumb{
    background:rgba(255,159,67,0.45);
    border-radius:999px;
}

</style>

</head>

<body class="fantasy-bg">

<div class="stars"></div>

<div class="computer-page">

<div class="page-topbar">
<div class="topbar-title">🎤 YouKe</div>
<div class="room-badge">Room {{ code }}</div>
</div>

<div class="computer-layout">

<div class="main-area glass-panel sticky-panel">

<div id="playerPanel" class="player-panel">

<div id="player"></div>

<div id="playerOverlay" class="overlay-message hidden"></div>

<div class="video-qr-overlay">
<div class="video-qr-title">Scan to Search Song</div>
<div id="qrcode" class="video-qr-box"></div>
</div>

<button id="fullscreenBtn"
class="fullscreen-fab"
onclick="toggleFullscreen()"
title="Fullscreen">⛶</button>

</div>

<div class="button-row left-buttons">

<button class="magic-btn green"
onclick="manualPlay()">▶ Play</button>

<button class="magic-btn orange"
onclick="manualSkip()">⏭ Skip</button>

<button class="magic-btn blue"
onclick="toggleFullscreen()">⛶ Fullscreen</button>

</div>

</div>

<div class="sidebar">

<div class="glass-panel mobile-link-panel">

<div class="section-title small-panel-title">
Mobile Link
</div>

<div class="small muted" id="mobileUrlText"></div>

</div>


<div id="currentBox" class="queue-stack now-playing-box"></div>


<div class="glass-panel queue-panel queue-scroll">

<div class="section-title small-panel-title">
Up Next
</div>

<div class="small muted drag-hint">
Tap a song card for quick actions.
</div>

<div id="queueBox" class="queue-stack"></div>

</div>

</div>

</div>

</div>

<script>

const ROOM_CODE="{{ code }}";
const BASE_URL="{{ base_url }}";
const MOBILE_URL=`${BASE_URL}/mobile/${ROOM_CODE}`;

let player=null;
let ytReady=false;
let lastNonce=-1;
let currentVideoId=null;
let currentIsPlaying=null;

document.getElementById("mobileUrlText").textContent=MOBILE_URL;

const qrCanvas=document.createElement("canvas");
document.getElementById("qrcode").appendChild(qrCanvas);

QRCode.toCanvas(qrCanvas,MOBILE_URL,{width:120});

function setOverlay(text,show=true){

const overlay=document.getElementById("playerOverlay");

overlay.textContent=text||"";

overlay.classList.toggle("hidden",!show);

}

function toggleFullscreen(){

const panel=document.getElementById("playerPanel");

if(!document.fullscreenElement){

panel.requestFullscreen();

}else{

document.exitFullscreen();

}

}

document.addEventListener("fullscreenchange",()=>{

const btn=document.getElementById("fullscreenBtn");

if(document.fullscreenElement){

btn.textContent="⤫";

}else{

btn.textContent="⛶";

}

});

function onYouTubeIframeAPIReady(){

player=new YT.Player("player",{

width:"100%",
height:"100%",

playerVars:{
autoplay:1,
rel:0,
modestbranding:1,
fs:0
},

events:{

onReady:()=>{

ytReady=true;

refreshState();

},

onStateChange:onPlayerStateChange,
onError:onPlayerError

}

});

}

function onPlayerStateChange(event){

if(event.data===YT.PlayerState.PLAYING){

setOverlay("",false);

}

if(event.data===YT.PlayerState.ENDED){

fetch(`/api/rooms/${ROOM_CODE}/skip`,{method:"POST"})
.then(()=>refreshState());

}

}

function onPlayerError(){

setOverlay("Video cannot be played. Skipping...",true);

fetch(`/api/rooms/${ROOM_CODE}/skip`,{method:"POST"})
.then(()=>refreshState());

}

async function refreshState(){

const res=await fetch(`/api/rooms/${ROOM_CODE}/state`);
const data=await res.json();

renderCurrent(data.current);
renderQueue(data.queue||[]);

if(!ytReady||!player)return;

const current=data.current;
const nonce=data.player_nonce;
const shouldPlay=data.is_playing;

if(!current){

currentVideoId=null;
setOverlay("No song playing",true);
return;

}

if(nonce!==lastNonce||current.videoId!==currentVideoId){

lastNonce=nonce;
currentVideoId=current.videoId;

setOverlay("Loading song...",true);

player.loadVideoById(current.videoId);

setTimeout(()=>{

if(shouldPlay)player.playVideo();

},700);

return;

}

}

function renderCurrent(current){

const box=document.getElementById("currentBox");

if(current){

box.innerHTML=`

<div class="song-card current-song sparkle-card">

<img src="${current.thumbnail}">

<div class="song-text">

<div class="song-pill now-pill">NOW PLAYING</div>

<div class="song-title">${current.title}</div>

<div class="song-sub">Singer : ${current.requestedBy}</div>

</div>

</div>

`;

}else{

box.innerHTML=`<div class="empty-box glass-panel">No song playing</div>`;

}

}

function renderQueue(queue){

const box=document.getElementById("queueBox");

if(!queue.length){

box.innerHTML=`<div class="empty-box">Queue empty</div>`;
return;

}

box.innerHTML=queue.map((item,idx)=>`

<div class="song-card sparkle-card">

<img src="${item.thumbnail}">

<div class="song-text">

<div class="song-pill result-pill">NEXT ${idx+1}</div>

<div class="song-title">${item.title}</div>

<div class="song-sub">Singer : ${item.requestedBy}</div>

</div>

</div>

`).join("");

}

async function manualPlay(){

await fetch(`/api/rooms/${ROOM_CODE}/play`,{method:"POST"});
refreshState();

}

async function manualSkip(){

await fetch(`/api/rooms/${ROOM_CODE}/skip`,{method:"POST"});
refreshState();

}

setInterval(refreshState,1500);

</script>

</body>
</html>
