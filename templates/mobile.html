<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>YouKe Karaoke Mobile {{ code }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body class="fantasy-bg">
    <div class="stars"></div>

    <div class="mobile-page">
        <div class="page-topbar mobile-topbar">
            <div class="topbar-title">🎶 YouKe Karaoke</div>
            <div class="language-switch" data-language-switch>
                <button type="button" data-lang-choice="en">EN</button>
                <button type="button" data-lang-choice="th">ไทย</button>
            </div>
            <div class="room-badge"><span data-i18n="room">Room</span> {{ code }}</div>
        </div>

        <div class="mobile-content">
            <div id="singerNamePanel" class="glass-panel mobile-controls singer-name-panel">
                <div class="section-title" data-i18n="yourSingerName">Your Name</div>
                <input id="mobile_name" data-i18n-placeholder="namePlaceholder" placeholder="Please enter your name" oninput="handleSingerNameChange()">
                <div class="small muted top-gap" data-i18n="nameHelp">You must enter your name before adding a song.</div>
                <div id="namePrompt" class="name-prompt" data-i18n="namePrompt">Enter singer name first, then search for a song.</div>

                <div class="section-title top-gap" data-i18n="searchSong">Search Song</div>
                <div class="search-mode-switch top-gap">
                    <button type="button" class="active" data-search-mode="song" onclick="setSearchMode('song')" data-i18n="songMode">Song</button>
                    <button type="button" data-search-mode="label" onclick="setSearchMode('label')" data-i18n="labelMode">Label</button>
                    <button type="button" data-search-mode="style" onclick="setSearchMode('style')" data-i18n="styleMode">Style</button>
                </div>
                <div id="songSearchRow" class="search-input-row">
                    <input id="song_search" data-i18n-placeholder="searchPlaceholder" placeholder="Search song title or artist" onfocus="handleSearchFocus()" oninput="handleSearchInput()">
                    <button type="button" class="clear-search-btn" onclick="clearSearch()" data-i18n="clear">Clear</button>
                </div>
                <div class="suggest-toggle-row">
                    <label class="checkbox-wrapper-25 youke-toggle">
                        <span data-i18n="recommendLabel">Recommend</span>
                        <input id="recommendToggleInput" type="checkbox" onchange="toggleRecommendedSongs(this.checked)">
                    </label>
                    <label class="checkbox-wrapper-25 youke-toggle">
                        <span data-i18n="autoSuggestLabel">Auto Suggest</span>
                        <input id="autoSuggestToggleInput" type="checkbox" onchange="toggleAutoSuggest(this.checked)">
                    </label>
                </div>
                <div id="msg" class="small muted top-gap"></div>
            </div>

            <div id="searchResults" class="mobile-queue"></div>
            <div id="currentBox" class="mobile-queue"></div>
            <div class="reaction-collapsible glass-panel mobile-controls">
                <button id="reactionToggleBtn" type="button" class="reaction-toggle-btn" onclick="toggleReactionComposer()" data-i18n="openReaction">Send Reaction</button>
                <div id="reactionComposer" class="reaction-composer hidden">
                    <div class="reaction-input-row">
                        <input id="reaction_text" data-i18n-placeholder="reactionPlaceholder" placeholder="Type a short reaction" maxlength="80" onkeydown="handleReactionKey(event)">
                        <button type="button" onclick="sendReaction()" data-i18n="sendReaction">Send</button>
                    </div>
                    <div class="small muted top-gap" data-i18n="reactionHelp">Less than 10 words.</div>
                </div>
            </div>

            <div class="glass-panel mobile-controls">
                <div class="section-title" data-i18n="upNext">Up Next</div>
                <div class="small muted drag-hint" data-i18n="dragHintMobile">Tap a song card for quick actions. Drag the three lines to reorder.</div>
                <div id="queueBox" class="mobile-queue"></div>
            </div>
        </div>
    </div>

        let searchTimer = null;
        let selectedQueueItemId = null;
        let quickActionLockUntil = 0;
        let queueSortable = null;
        let isDraggingQueue = false;
        let searchMode = "song";
        let selectedSinger = "";
        let selectedLabel = "";
        let selectedStyle = "";
        let recommendEnabled = false;
        let reactionComposerOpen = false;
        let autoSuggestEnabled = localStorage.getItem(AUTO_SUGGEST_KEY) === "1";
        let autoSuggestPending = false;
        let autoRefreshPending = false;
        let selectedSongCount = Number(localStorage.getItem(AUTO_SUGGEST_COUNT_KEY) || 0);

        function getLang() {
            return localStorage.getItem(LANG_KEY) || "en";
        }

        function t(key) {
            return (I18N[getLang()] && I18N[getLang()][key]) || I18N.en[key] || key;
        }

        function applyLanguage() {
            document.documentElement.lang = getLang();
            document.querySelectorAll("[data-i18n]").forEach(el => {
                el.textContent = t(el.dataset.i18n);
            });
            document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
                el.placeholder = t(el.dataset.i18nPlaceholder);
            });
            document.querySelectorAll("[data-lang-choice]").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.langChoice === getLang());
            });
            updateSearchPlaceholder();
            updateRecommendToggleLabel();
            updateAutoSuggestToggleLabel();
            updateReactionToggleLabel();
        }

        document.querySelectorAll("[data-lang-choice]").forEach(btn => {
            btn.addEventListener("click", () => {
                localStorage.setItem(LANG_KEY, btn.dataset.langChoice);
                applyLanguage();
                refreshState();
            });
        });

        function loadSingerName() {
            const saved = localStorage.getItem(SINGER_KEY) || "";
            document.getElementById("mobile_name").value = saved;
            updateSingerPrompt();
        }

        function saveSingerName() {
            const name = document.getElementById("mobile_name").value.trim();
            if (name) {
                localStorage.setItem(SINGER_KEY, name);
            } else {
                localStorage.removeItem(SINGER_KEY);
            }
            updateSingerPrompt();
            return name;
        }

        function handleSingerNameChange() {
            saveSingerName();
        }

        function updateSingerPrompt(force = false) {
            const panel = document.getElementById("singerNamePanel");
            const name = document.getElementById("mobile_name").value.trim();
            panel.classList.toggle("needs-name", force || !name);
        }

        function promptSingerName() {
            updateSingerPrompt(true);
            document.getElementById("msg").textContent = t("nameFirst");
            document.getElementById("mobile_name").focus();
        }

        function handleSearchFocus() {
            if (!document.getElementById("mobile_name").value.trim()) {
                promptSingerName();
            }
        }

        function handleSearchInput() {
            if (!saveSingerName()) {
                clearTimeout(searchTimer);
                document.getElementById("searchResults").innerHTML = "";
                promptSingerName();
                return;
            }
            setRecommendEnabled(false);
            clearTimeout(searchTimer);
            searchTimer = setTimeout(runSearch, 300);
        }

        function setSearchMode(mode) {
            setRecommendEnabled(false);
            searchMode = mode;
            selectedSinger = "";
            selectedLabel = "";
            selectedStyle = "";
            clearTimeout(searchTimer);
            document.querySelectorAll("[data-search-mode]").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.searchMode === mode);
            });
            document.getElementById("song_search").value = "";
            document.getElementById("searchResults").innerHTML = "";
            document.getElementById("msg").textContent = "";
            document.getElementById("songSearchRow").classList.toggle("hidden", mode === "label" || mode === "style");
            updateSearchPlaceholder();
            if (mode === "label") {
                loadLabels();
            } else if (mode === "style") {
                loadStyles();
            } else {
                document.getElementById("song_search").focus();
            }
        }

        function updateSearchPlaceholder() {
            const input = document.getElementById("song_search");
            if (!input) return;
            input.placeholder = t("searchPlaceholder");
        }

        function clearSearch() {
            clearTimeout(searchTimer);
            setRecommendEnabled(false);
            const input = document.getElementById("song_search");
            input.value = "";
            selectedSinger = "";
            selectedLabel = "";
            selectedStyle = "";
            document.getElementById("searchResults").innerHTML = "";
            document.getElementById("msg").textContent = "";
            if (searchMode === "label") {
                loadLabels();
            } else if (searchMode === "style") {
                loadStyles();
            } else {
                input.focus();
            }
        }

        function lockQuickActions(ms = 5000) {
            quickActionLockUntil = Date.now() + ms;
        }

        function isQuickActionsLocked() {
            return Date.now() < quickActionLockUntil;
        }

        async function runSearch() {
            const q = document.getElementById("song_search").value.trim();
            const box = document.getElementById("searchResults");

            if (!q) {
                box.innerHTML = "";
                return;
            }

            const url = `/api/song/search?q=${encodeURIComponent(q)}&limit=20`;
            const res = await fetch(url);
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderSearchResults(data.results || []);
        }

        async function loadRecommendedSongs() {
            const box = document.getElementById("searchResults");
            const name = saveSingerName();
            if (!name) {
                setRecommendEnabled(false);
                promptSingerName();
                return;
            }
            searchMode = "song";
            selectedSinger = "";
            selectedLabel = "";
            selectedStyle = "";
            document.querySelectorAll("[data-search-mode]").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.searchMode === "song");
            });
            document.getElementById("songSearchRow").classList.remove("hidden");
            document.getElementById("song_search").value = "";
            setRecommendEnabled(true);

            box.innerHTML = `<div class="empty-box glass-panel">${t("popularSongs")}</div>`;

            const res = await fetch("/api/song/recommended?limit=5");
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderRecommendedSongs(data.results || []);
        }

        function setRecommendEnabled(enabled) {
            recommendEnabled = enabled;
            updateRecommendToggleLabel();
        }

        function updateRecommendToggleLabel() {
            const input = document.getElementById("recommendToggleInput");
            if (!input) return;
            input.checked = recommendEnabled;
        }

        function updateAutoSuggestToggleLabel() {
            const input = document.getElementById("autoSuggestToggleInput");
            if (!input) return;
            input.checked = autoSuggestEnabled;
        }

        function toggleAutoSuggest(forceValue) {
            autoSuggestEnabled = typeof forceValue === "boolean" ? forceValue : !autoSuggestEnabled;
            localStorage.setItem(AUTO_SUGGEST_KEY, autoSuggestEnabled ? "1" : "0");
            updateAutoSuggestToggleLabel();
            fetch(`/api/rooms/${ROOM_CODE}/auto_suggest`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ enabled: autoSuggestEnabled })
            }).catch(() => {});
        }

        async function toggleRecommendedSongs(forceValue) {
            const shouldEnable = typeof forceValue === "boolean" ? forceValue : !recommendEnabled;
            if (!shouldEnable) {
                setRecommendEnabled(false);
                document.getElementById("searchResults").innerHTML = "";
                document.getElementById("song_search").focus();
                return;
            }
            await loadRecommendedSongs();
        }

        function renderSingerResults(results) {
            const box = document.getElementById("searchResults");

            if (!results.length) {
                box.innerHTML = `<div class="empty-box glass-panel">${t("noSingers")}</div>`;
                return;
            }

            box.innerHTML = results.map(singer => `
                <button type="button" class="singer-result-card sparkle-card" onclick="loadSingerSongs('${escapeJs(singer.name)}')">
                    <div class="song-pill result-pill">${t("singerResult")}</div>
                    <div class="singer-result-name">${escapeHtml(singer.name)}</div>
                    <div class="singer-result-count">${Number(singer.songCount || 0)} ${t("songCount")}</div>
                </button>
            `).join("");
        }

        function renderLabelResults(results) {
            const box = document.getElementById("searchResults");

            if (!results.length) {
                box.innerHTML = `<div class="empty-box glass-panel">${t("noLabels")}</div>`;
                return;
            }

            box.innerHTML = `
                ${renderBrowseHeader({
                    eyebrow: t("labelMode"),
                    title: t("chooseLabel"),
                    meta: `${results.length} ${t("available")}`
                })}
                <div class="style-icon-grid">
                    ${results.map(label => `
                        <button type="button" class="label-logo-card" onclick="loadLabelSongs('${escapeJs(label.id || label.name)}', '${escapeJs(label.name)}')">
                            ${
                                label.logo
                                    ? `<img src="${escapeHtml(label.logo)}" alt="${escapeHtml(label.name)}">`
                                    : `<div class="label-other-mark">OTHER</div>`
                            }
                            <div class="label-logo-name">${escapeHtml(label.name)}</div>
                            <div class="label-logo-count">${Number(label.songCount || 0)}</div>
                        </button>
                    `).join("")}
                </div>
            `;
        }

        async function loadStyles() {
            const box = document.getElementById("searchResults");
            box.innerHTML = `<div class="empty-box glass-panel">${t("chooseStyle")}</div>`;

            const res = await fetch("/api/style/list");
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderStyleResults(data.results || []);
        }

        function renderStyleResults(results) {
            const box = document.getElementById("searchResults");

            if (!results.length) {
                box.innerHTML = `<div class="empty-box glass-panel">${t("noStyles")}</div>`;
                return;
            }

            box.innerHTML = `
                ${renderBrowseHeader({
                    eyebrow: t("styleMode"),
                    title: t("chooseStyle"),
                    meta: `${results.length} ${t("available")}`
                })}
                <div class="style-icon-grid">
                    ${results.map(style => `
                        <button type="button" class="style-icon-card style-${escapeHtml(style.id)}" onclick="loadStyleSongs('${escapeJs(style.id)}', '${escapeJs(style.name)}')">
                            <div class="style-icon-mark">${getStyleIcon(style.id)}</div>
                            <div class="style-icon-name">${escapeHtml(style.name)}</div>
                        </button>
                    `).join("")}
                </div>
            `;
        }

        function getStyleIcon(styleId) {
            const icons = {
                pop: "POP",
                rock: "ROCK",
                lukthung: "LT",
                morlam: "ML",
                dance: "DANCE",
                indie: "IND",
                ost: "OST",
                "90s": "90s",
                "2000s": "2K",
                duet: "DUO",
                heartbreak: "LOVE",
                party: "FUN"
            };
            return icons[styleId] || "MUSIC";
        }

        function renderBrowseHeader({ eyebrow, title, meta = "", backLabel = "", backAction = "" }) {
            return `
                <div class="browse-header glass-panel ${backAction ? "" : "no-back"}">
                    ${backAction ? `<button type="button" class="browse-back-btn" onclick="${backAction}">&larr; ${escapeHtml(backLabel || t("backToLabels"))}</button>` : ""}
                    <div class="browse-heading">
                        <div class="song-pill result-pill">${escapeHtml(eyebrow || "")}</div>
                        <div class="browse-title">${escapeHtml(title || "")}</div>
                        ${meta ? `<div class="browse-meta">${escapeHtml(meta)}</div>` : ""}
                    </div>
                </div>
            `;
        }

        function renderSongCards(results) {
            return results.map(song => `
                <div class="song-card sparkle-card result-card">
                    <img src="${escapeHtml(song.thumbnail)}" alt="thumbnail">
                    <div class="song-text">
                        <div class="song-pill result-pill">${t("searchResult")}</div>
                        <div class="song-title">${escapeHtml(song.title || song.videoId)}</div>
                        <div class="song-sub">${escapeHtml(song.channelName || "")}</div>
                        <div class="song-action-row">
                            <button class="magic-btn pink small-action-btn" onclick="addSongFromDb('${escapeJs(song.videoId)}')">
                                ${t("add")}
                            </button>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function renderRecommendedSongs(results) {
            const box = document.getElementById("searchResults");
            const header = renderBrowseHeader({
                eyebrow: t("searchSong"),
                title: t("popularSongs"),
                meta: t("popularHint")
            });

            if (!results.length) {
                box.innerHTML = "";
                return;
            }

            box.innerHTML = header + renderSongCards(results);
        }

        async function loadStyleSongs(styleId, styleName) {
            selectedStyle = styleId;
            const box = document.getElementById("searchResults");
            box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(t("songsByStyle"))} ${escapeHtml(styleName)}</div>`;

            const res = await fetch(`/api/style/songs?style=${encodeURIComponent(styleId)}&limit=30`);
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderStyleSongResults(styleName, data.results || []);
        }

        function renderStyleSongResults(styleName, results) {
            const box = document.getElementById("searchResults");
            const header = renderBrowseHeader({
                eyebrow: t("songsByStyle"),
                title: styleName,
                meta: `${results.length} ${t("songCount")}`,
                backLabel: t("backToStyles"),
                backAction: "loadStyles()"
            });

            if (!results.length) {
                box.innerHTML = `${header}<div class="empty-box glass-panel">${t("noSongs")}</div>`;
                return;
            }

            box.innerHTML = header + renderSongCards(results);
        }

        async function loadLabels() {
            const box = document.getElementById("searchResults");
            box.innerHTML = `<div class="empty-box glass-panel">${t("chooseLabel")}</div>`;

            const res = await fetch("/api/label/search?limit=50");
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderLabelResults(data.results || []);
        }

        async function loadSingerSongs(singerName) {
            selectedSinger = singerName;
            const box = document.getElementById("searchResults");
            box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(t("songsBySinger"))} ${escapeHtml(singerName)}</div>`;

            const res = await fetch(`/api/singer/songs?singer=${encodeURIComponent(singerName)}&limit=30`);
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderSingerSongResults(singerName, data.results || []);
        }

        function renderSingerSongResults(singerName, results) {
            const box = document.getElementById("searchResults");
            const header = renderBrowseHeader({
                eyebrow: t("songsBySinger"),
                title: singerName,
                meta: `${results.length} ${t("songCount")}`,
                backLabel: t("backToSingers"),
                backAction: "runSearch()"
            });

            if (!results.length) {
                box.innerHTML = `${header}<div class="empty-box glass-panel">${t("noSongs")}</div>`;
                return;
            }

            box.innerHTML = header + renderSongCards(results);
        }

        async function loadLabelSongs(labelId, labelName = labelId) {
            selectedLabel = labelId;
            selectedSinger = "";
            const box = document.getElementById("searchResults");
            box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(t("chooseSingerBand"))}</div>`;

            const res = await fetch(`/api/label/singers?label=${encodeURIComponent(labelId)}&limit=200`);
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderLabelSingerResults(labelId, labelName, data.results || []);
        }

        function renderLabelSingerResults(labelId, labelName, results) {
            const box = document.getElementById("searchResults");
            const header = renderBrowseHeader({
                eyebrow: t("labelMode"),
                title: labelName,
                meta: `${results.length} ${t("artistCount")}`,
                backLabel: t("backToLabels"),
                backAction: "loadLabels()"
            });

            if (!results.length) {
                box.innerHTML = `${header}<div class="empty-box glass-panel">${t("noSingerBands")}</div>`;
                return;
            }

            box.innerHTML = header + results.map(singer => `
                <button type="button" class="singer-result-card sparkle-card" onclick="loadLabelSingerSongs('${escapeJs(labelId)}', '${escapeJs(labelName)}', '${escapeJs(singer.name)}')">
                    <div class="song-pill result-pill">${t("singerResult")}</div>
                    <div class="singer-result-name">${escapeHtml(singer.name)}</div>
                    <div class="singer-result-count">${Number(singer.songCount || 0)} ${t("songCount")}</div>
                </button>
            `).join("");
        }

        async function loadLabelSingerSongs(labelId, labelName, singerName) {
            selectedLabel = labelId;
            selectedSinger = singerName;
            const box = document.getElementById("searchResults");
            box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(t("songsBySinger"))} ${escapeHtml(singerName)}</div>`;

            const res = await fetch(`/api/label/singer_songs?label=${encodeURIComponent(labelId)}&singer=${encodeURIComponent(singerName)}&limit=30`);
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                return;
            }

            renderLabelSongResults(labelId, labelName, singerName, data.results || []);
        }

        function renderLabelSongResults(labelId, labelName, singerName, results) {
            const box = document.getElementById("searchResults");
            const header = renderBrowseHeader({
                eyebrow: labelName,
                title: singerName,
                meta: `${results.length} ${t("songCount")}`,
                backLabel: t("backToSingers"),
                backAction: `loadLabelSongs('${escapeJs(labelId)}', '${escapeJs(labelName)}')`
            });

            if (!results.length) {
                box.innerHTML = `${header}<div class="empty-box glass-panel">${t("noSongs")}</div>`;
                return;
            }

            box.innerHTML = header + renderSongCards(results);
        }

        function renderSearchResults(results) {
            const box = document.getElementById("searchResults");

            if (!results.length) {
                box.innerHTML = renderEmptySearchBox();
                return;
            }

            box.innerHTML = renderSongCards(results);
        }

        function renderEmptySearchBox(message = "") {
            const q = document.getElementById("song_search").value.trim();
            const canRefresh = searchMode === "song" && q.length >= 2;

            return `
                <div class="empty-box glass-panel">
                    <div>${escapeHtml(message || t("noSongs"))}</div>
                    ${
                        canRefresh
                            ? `<div class="small muted top-gap">${escapeHtml(t("autoRefreshHint"))}</div>
                               <button type="button" class="quick-action-btn top-gap" onclick="refreshMissingSongs('${escapeJs(q)}')" ${autoRefreshPending ? "disabled" : ""}>
                                   ${escapeHtml(t("autoRefreshAction"))}
                               </button>`
                            : ``
                    }
                </div>
            `;
        }

        async function refreshMissingSongs(query) {
            if (autoRefreshPending) return;

            const box = document.getElementById("searchResults");
            const msg = document.getElementById("msg");
            autoRefreshPending = true;
            box.innerHTML = renderEmptySearchBox(t("autoRefreshRunning"));
            msg.textContent = t("autoRefreshRunning");

            try {
                const res = await fetch("/api/song/refresh_missing", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ q: query })
                });
                const data = await res.json();

                if (!res.ok) {
                    box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || t("searchFailed"))}</div>`;
                    msg.textContent = data.error || t("searchFailed");
                    return;
                }

                if ((data.results || []).length) {
                    msg.textContent = data.foundCount > 0 ? t("autoRefreshDone") : t("autoRefreshNone");
                    renderSearchResults(data.results || []);
                    return;
                }

                msg.textContent = t("autoRefreshNone");
                autoRefreshPending = false;
                box.innerHTML = renderEmptySearchBox(t("autoRefreshNone"));
            } catch (err) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(t("searchFailed"))}</div>`;
                msg.textContent = t("searchFailed");
            } finally {
                autoRefreshPending = false;
            }
        }

        async function addSongFromDb(videoId) {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                promptSingerName();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/add`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    video_id: videoId,
                    requested_by: name
                })
            });

            const data = await res.json();

            if (!res.ok) {
                msg.textContent = data.error || t("addFailed");
                return;
            }

            msg.textContent = data.message || t("songAdded");
            selectedSongCount += 1;
            localStorage.setItem(AUTO_SUGGEST_COUNT_KEY, String(selectedSongCount));
            refreshState();
        }

        function reactionWordCount(value) {
            return value.trim().split(/\s+/).filter(Boolean).length;
        }

        function reactionErrorMessage(data) {
            const codeMap = {
                reaction_empty: "reactionEmpty",
                reaction_too_long: "reactionTooLong",
                reaction_wait: "reactionWait",
                reaction_blocked: "reactionBlocked",
                reaction_link_blocked: "reactionLinkBlocked",
                reaction_spam: "reactionSpam"
            };
            const key = codeMap[data && data.code];
            return key ? t(key) : ((data && data.error) || t("reactionWait"));
        }

        function updateReactionToggleLabel() {
            const btn = document.getElementById("reactionToggleBtn");
            if (!btn) return;
            btn.textContent = reactionComposerOpen ? t("hideReaction") : t("openReaction");
        }

        function toggleReactionComposer() {
            reactionComposerOpen = !reactionComposerOpen;
            const composer = document.getElementById("reactionComposer");
            composer.classList.toggle("hidden", !reactionComposerOpen);
            updateReactionToggleLabel();
            if (reactionComposerOpen) {
                document.getElementById("reaction_text").focus();
            }
        }

        function handleReactionKey(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendReaction();
            }
        }

        async function sendReaction() {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                promptSingerName();
                return;
            }

            const input = document.getElementById("reaction_text");
            const message = input.value.trim().replace(/\s+/g, " ");
            if (!message) {
                msg.textContent = t("reactionEmpty");
                input.focus();
                return;
            }
            if (reactionWordCount(message) > 10) {
                msg.textContent = t("reactionTooLong");
                input.focus();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/reaction`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    requested_by: name,
                    message
                })
            });
            const data = await res.json();

            if (!res.ok) {
                msg.textContent = reactionErrorMessage(data);
                return;
            }

            input.value = "";
            msg.textContent = t("reactionSent");
            reactionComposerOpen = false;
            document.getElementById("reactionComposer").classList.add("hidden");
            updateReactionToggleLabel();
        }

        async function refreshState() {
            const res = await fetch(`/api/rooms/${ROOM_CODE}/state`);
            const data = await res.json();

            renderCurrent(data.current);
            maybeAutoSuggest(data);

            if (isQuickActionsLocked() || isDraggingQueue) {
                return;
            }

            renderQueue(data.queue || []);
        }

        async function maybeAutoSuggest(state) {
            if (!autoSuggestEnabled || autoSuggestPending) return;
            if (!state || !state.current) return;
            if ((state.queue || []).length > 1) return;

            autoSuggestPending = true;
            try {
                const res = await fetch(`/api/rooms/${ROOM_CODE}/auto_suggest`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ enabled: true })
                });
                const data = await res.json();
                if (res.ok && data.added) {
                    document.getElementById("msg").textContent = t("autoSuggestAdded");
                    setTimeout(() => refreshState(), 250);
                }
            } catch (err) {
                console.error("auto suggest failed", err);
            } finally {
                autoSuggestPending = false;
            }
        }

        function renderCurrent(current) {
            const currentBox = document.getElementById("currentBox");

            if (current) {
                currentBox.innerHTML = `
                    <div class="song-card current-song sparkle-card">
                        <img src="${escapeHtml(current.thumbnail)}" alt="thumbnail">
                        <div class="song-text">
                            <div class="song-pill now-pill">${t("nowPlaying")}</div>
                            <div class="song-title">${escapeHtml(current.title || current.videoId)}</div>
                            <div class="song-sub">${t("singer")} : ${escapeHtml(current.requestedBy || t("guest"))}</div>
                        </div>
                    </div>
                    ${renderPlaybackControls()}
                `;
            } else {
                currentBox.innerHTML = `
                    <div class="empty-box glass-panel">${t("noSongPlaying")}</div>
                    ${renderPlaybackControls()}
                `;
            }
        }

        function renderPlaybackControls() {
            return `
                <div class="playback-button-row">
                    <button class="magic-btn green" onclick="playSong()">${t("play")}</button>
                    <button class="magic-btn blue" onclick="pauseSong()">${t("pause")}</button>
                    <button class="magic-btn orange" onclick="skipSong()">${t("skip")}</button>
                </div>
            `;
        }

        function renderQueue(queue) {
            const queueBox = document.getElementById("queueBox");

            if (!queue.length) {
                selectedQueueItemId = null;
                destroySortable();
                queueBox.innerHTML = `<div class="empty-box glass-panel">${t("queueEmpty")}</div>`;
                return;
            }

            const exists = queue.some(item => item.itemId === selectedQueueItemId);
            if (!exists) {
                selectedQueueItemId = null;
            }

            queueBox.innerHTML = queue.map((item, idx) => {
                const isSelected = item.itemId === selectedQueueItemId;
                const cardClasses = `queue-list-row queue-item-draggable queue-item-card${isSelected ? " queue-item-selected" : ""}`;
                return `
                    <div class="${cardClasses}" data-item-id="${item.itemId}">
                        <div class="drag-handle" title="Drag to reorder" aria-label="Drag to reorder">☰</div>
                        <div class="queue-position">${t("next")} ${idx + 1}</div>
                        <div class="song-text">
                            <div class="song-title">${escapeHtml(item.title || item.videoId)}</div>
                            <div class="song-sub">${t("singer")} : ${escapeHtml(item.requestedBy || t("guest"))}</div>
                            ${isSelected ? renderQuickActions(item.itemId, idx, queue.length) : ""}
                        </div>
                    </div>
                `;
            }).join("");

            attachQueueCardEvents();
            attachQuickActionEvents();
            initSortable();
        }

        function renderQuickActions(itemId, queueIndex, queueLength) {
            const options = buildPositionOptions(queueIndex, queueLength);

            return `
                <div class="quick-actions-row" onclick="event.stopPropagation()">
                    <button class="quick-action-btn" onclick="moveQueueItem(${itemId}, 'next')">${t("quickNext")}</button>
                    <button class="quick-action-btn secondary" onclick="moveQueueItem(${itemId}, 'last')">${t("quickLast")}</button>
                    <button class="quick-action-btn secondary" onclick="deleteQueueItem(${itemId})">🗑</button>
                    ${
                        options.length
                            ? `<div class="quick-action-select-wrap">
                                    <select class="quick-action-select" onchange="handlePositionChange(${itemId}, this.value)">
                                        <option value="">${t("moveTo")}</option>
                                        ${options.map(opt => `<option value="${opt.targetIndex}">${opt.label}</option>`).join("")}
                                    </select>
                               </div>`
                            : ``
                    }
                </div>
            `;
        }

        function buildPositionOptions(queueIndex, queueLength) {
            const options = [];
            for (let overallPos = 3; overallPos <= queueLength; overallPos++) {
                const targetIndex = overallPos - 2;
                if (targetIndex === queueIndex) continue;
                options.push({
                    label: `${t("position")} ${overallPos}`,
                    targetIndex
                });
            }
            return options;
        }

        function attachQueueCardEvents() {
            const cards = document.querySelectorAll("#queueBox .queue-item-draggable");

            cards.forEach(card => {
                const itemId = Number(card.dataset.itemId);

                card.addEventListener("click", (event) => {
                    if (event.target.closest(".quick-actions-row")) return;
                    if (isDraggingQueue) return;
                    if (Date.now() < quickActionLockUntil) return;
                    selectedQueueItemId = (selectedQueueItemId === itemId) ? null : itemId;
                    renderQueueFromDomState();
                });
            });
        }

        function attachQuickActionEvents() {
            const actionContainers = document.querySelectorAll("#queueBox .quick-actions-row");
            const selects = document.querySelectorAll("#queueBox .quick-action-select");

            actionContainers.forEach(el => {
                ["pointerdown", "mousedown", "touchstart", "click"].forEach(evt => {
                    el.addEventListener(evt, () => lockQuickActions(5000));
                });
            });

            selects.forEach(el => {
                ["focus", "pointerdown", "mousedown", "touchstart", "click"].forEach(evt => {
                    el.addEventListener(evt, () => lockQuickActions(10000));
                });

                el.addEventListener("blur", () => {
                    setTimeout(() => {
                        quickActionLockUntil = 0;
                        refreshState();
                    }, 150);
                });
            });
        }

        function destroySortable() {
            if (queueSortable) {
                queueSortable.destroy();
                queueSortable = null;
            }
        }

        function initSortable() {
            const queueBox = document.getElementById("queueBox");
            if (!queueBox) return;

            destroySortable();

            queueSortable = new Sortable(queueBox, {
                animation: 150,
                ghostClass: "blue-background-class",
                chosenClass: "sortable-chosen-card",
                dragClass: "sortable-drag-card",
                handle: ".drag-handle",
                filter: ".quick-actions-row, .quick-action-btn, .quick-action-select",
                preventOnFilter: false,
                delayOnTouchOnly: true,
                delay: 0,
                touchStartThreshold: 2,
                scroll: true,
                scrollSensitivity: 64,
                scrollSpeed: 12,
                swapThreshold: 0.68,
                onStart: () => {
                    isDraggingQueue = true;
                    document.body.classList.add("queue-drag-active");
                    lockQuickActions(10000);
                },
                onEnd: async () => {
                    const orderedIds = Array.from(
                        queueBox.querySelectorAll("[data-item-id]")
                    ).map(el => Number(el.dataset.itemId));

                    await sendReorder(orderedIds);
                    isDraggingQueue = false;
                    document.body.classList.remove("queue-drag-active");
                    quickActionLockUntil = 0;
                    refreshState();
                },
                onUnchoose: () => {
                    isDraggingQueue = false;
                    document.body.classList.remove("queue-drag-active");
                }
            });
        }

        async function renderQueueFromDomState() {
            const res = await fetch(`/api/rooms/${ROOM_CODE}/state`);
            const data = await res.json();
            renderQueue(data.queue || []);
        }

        async function sendReorder(orderedIds) {
            await fetch(`/api/rooms/${ROOM_CODE}/reorder_queue`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ordered_ids: orderedIds })
            });
        }

        async function moveQueueItem(itemId, mode) {
            lockQuickActions(3000);

            const queueBox = document.getElementById("queueBox");
            const orderedIds = Array.from(queueBox.querySelectorAll("[data-item-id]"))
                .map(el => Number(el.dataset.itemId));

            const fromIndex = orderedIds.indexOf(itemId);
            if (fromIndex < 0) return;

            const [moved] = orderedIds.splice(fromIndex, 1);

            if (mode === "next") {
                orderedIds.splice(0, 0, moved);
            } else if (mode === "last") {
                orderedIds.push(moved);
            }

            await sendReorder(orderedIds);
            quickActionLockUntil = 0;
            refreshState();
        }

        async function handlePositionChange(itemId, targetIndexValue) {
            lockQuickActions(3000);

            if (!targetIndexValue) return;

            const targetIndex = Number(targetIndexValue);
            if (Number.isNaN(targetIndex)) return;

            const queueBox = document.getElementById("queueBox");
            const orderedIds = Array.from(queueBox.querySelectorAll("[data-item-id]"))
                .map(el => Number(el.dataset.itemId));

            const fromIndex = orderedIds.indexOf(itemId);
            if (fromIndex < 0 || fromIndex === targetIndex) return;

            const [moved] = orderedIds.splice(fromIndex, 1);
            orderedIds.splice(targetIndex, 0, moved);

            await sendReorder(orderedIds);
            quickActionLockUntil = 0;
            refreshState();
        }

        async function deleteQueueItem(itemId) {
            lockQuickActions(3000);

            await fetch(`/api/rooms/${ROOM_CODE}/delete`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ item_id: itemId })
            });

            quickActionLockUntil = 0;
            refreshState();
        }

        async function playSong() {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                promptSingerName();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/play`, { method: "POST" });
            const data = await res.json();

            if (!res.ok) {
                msg.textContent = data.error || t("playFailed");
                return;
            }

            msg.textContent = t("played");
            refreshState();
        }

        async function pauseSong() {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                promptSingerName();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/pause`, { method: "POST" });
            const data = await res.json();

            if (!res.ok) {
                msg.textContent = data.error || t("pauseFailed");
                return;
            }

            msg.textContent = data.message || t("paused");
            refreshState();
        }

        async function skipSong() {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                promptSingerName();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/skip`, { method: "POST" });
            const data = await res.json();

            if (!res.ok) {
                msg.textContent = data.error || t("skipFailed");
                return;
            }

            msg.textContent = data.message || t("skipped");
            refreshState();
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeJs(str) {
            return String(str).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
        }

        applyLanguage();
        loadSingerName();
        if (!document.getElementById("mobile_name").value.trim()) {
            setTimeout(() => promptSingerName(), 250);
        }
        setInterval(refreshState, 1500);
        refreshState();
    </script>
</body>
</html>
