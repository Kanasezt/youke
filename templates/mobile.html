<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>YouKe Karaoke Mobile {{ code }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="fantasy-bg">
    <div class="stars"></div>

    <div class="mobile-page">
        <div class="page-topbar mobile-topbar">
            <div class="topbar-title">🎶 YouKe Karaoke</div>
            <div class="room-badge">Room {{ code }}</div>
        </div>

        <div class="mobile-content">
            <div class="glass-panel mobile-controls">
                <div class="section-title">Your Singer Name</div>
                <input id="mobile_name" placeholder="Please enter your name" oninput="handleSingerNameChange()">
                <div class="small muted top-gap">You must enter your name before adding a song.</div>

                <div class="button-grid top-gap">
                    <button class="magic-btn green" onclick="playSong()">▶ Play</button>
                    <button class="magic-btn orange" onclick="skipSong()">⏭ Skip</button>
                </div>

                <div class="section-title top-gap">Search Song</div>
                <input id="song_search" placeholder="Search song title or artist" oninput="handleSearchInput()">
                <div id="msg" class="small muted top-gap"></div>
            </div>

            <div id="searchResults" class="mobile-queue"></div>
            <div id="currentBox" class="mobile-queue"></div>

            <div class="glass-panel mobile-controls">
                <div class="section-title">Up Next</div>
                <div class="small muted drag-hint">Tap a song card for quick actions.</div>
                <div id="queueBox" class="mobile-queue"></div>
            </div>
        </div>
    </div>

    <script>
        const ROOM_CODE = "{{ code }}";
        const SINGER_KEY = `youke_karaoke_singer_${ROOM_CODE}`;

        let searchTimer = null;
        let selectedQueueItemId = null;
        let quickActionLockUntil = 0;

        function loadSingerName() {
            const saved = localStorage.getItem(SINGER_KEY) || "";
            document.getElementById("mobile_name").value = saved;
        }

        function saveSingerName() {
            const name = document.getElementById("mobile_name").value.trim();
            if (name) {
                localStorage.setItem(SINGER_KEY, name);
            } else {
                localStorage.removeItem(SINGER_KEY);
            }
            return name;
        }

        function handleSingerNameChange() {
            saveSingerName();
        }

        function handleSearchInput() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(runSearch, 300);
        }

        async function runSearch() {
            const q = document.getElementById("song_search").value.trim();
            const box = document.getElementById("searchResults");

            if (!q) {
                box.innerHTML = "";
                return;
            }

            const res = await fetch(`/api/song/search?q=${encodeURIComponent(q)}&limit=20`);
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<div class="empty-box glass-panel">${escapeHtml(data.error || "Search failed")}</div>`;
                return;
            }

            renderSearchResults(data.results || []);
        }

        function renderSearchResults(results) {
            const box = document.getElementById("searchResults");

            if (!results.length) {
                box.innerHTML = `<div class="empty-box glass-panel">No songs found</div>`;
                return;
            }

            box.innerHTML = results.map(song => `
                <div class="song-card sparkle-card result-card">
                    <img src="${escapeHtml(song.thumbnail)}" alt="thumbnail">
                    <div class="song-text">
                        <div class="song-pill result-pill">SEARCH RESULT</div>
                        <div class="song-title">${escapeHtml(song.title || song.videoId)}</div>
                        <div class="song-sub">${escapeHtml(song.channelName || "")}</div>
                        <div class="song-action-row">
                            <button class="magic-btn pink small-action-btn" onclick="addSongFromDb('${escapeJs(song.videoId)}')">
                                Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        async function addSongFromDb(videoId) {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                msg.textContent = "Please enter your singer name first";
                document.getElementById("mobile_name").focus();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/add`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    video_id: videoId,
                    requested_by: name
                })
            });

            const data = await res.json();

            if (!res.ok) {
                msg.textContent = data.error || "Add failed";
                return;
            }

            msg.textContent = data.message || "Song added";
            refreshState();
        }

        function lockQuickActions(ms = 5000) {
            quickActionLockUntil = Date.now() + ms;
        }

        function isQuickActionsLocked() {
            return Date.now() < quickActionLockUntil;
        }

        async function refreshState() {
            const res = await fetch(`/api/rooms/${ROOM_CODE}/state`);
            const data = await res.json();

            renderCurrent(data.current);

            if (isQuickActionsLocked()) {
                return;
            }

            renderQueue(data.queue || []);
        }

        function renderCurrent(current) {
            const currentBox = document.getElementById("currentBox");

            if (current) {
                currentBox.innerHTML = `
                    <div class="song-card current-song sparkle-card">
                        <img src="${escapeHtml(current.thumbnail)}" alt="thumbnail">
                        <div class="song-text">
                            <div class="song-pill now-pill">NOW PLAYING</div>
                            <div class="song-title">${escapeHtml(current.title || current.videoId)}</div>
                            <div class="song-sub">Singer : ${escapeHtml(current.requestedBy || "Guest")}</div>
                        </div>
                    </div>
                `;
            } else {
                currentBox.innerHTML = `<div class="empty-box glass-panel">No song playing</div>`;
            }
        }

        function renderQueue(queue) {
            const queueBox = document.getElementById("queueBox");

            if (!queue.length) {
                selectedQueueItemId = null;
                queueBox.innerHTML = `<div class="empty-box glass-panel">Queue empty</div>`;
                return;
            }

            const exists = queue.some(item => item.itemId === selectedQueueItemId);
            if (!exists) {
                selectedQueueItemId = null;
            }

            queueBox.innerHTML = queue.map((item, idx) => {
                const isSelected = item.itemId === selectedQueueItemId;
                const cardClasses = `song-card sparkle-card queue-item-draggable draggable-song${isSelected ? " queue-item-selected" : ""}`;
                return `
                    <div class="${cardClasses}" data-item-id="${item.itemId}">
                        <img src="${escapeHtml(item.thumbnail)}" alt="thumbnail">
                        <div class="song-text">
                            <div class="song-pill result-pill">NEXT ${idx + 1}</div>
                            <div class="song-title">${escapeHtml(item.title || item.videoId)}</div>
                            <div class="song-sub">Singer : ${escapeHtml(item.requestedBy || "Guest")}</div>
                            ${isSelected ? renderQuickActions(item.itemId, idx, queue.length) : ""}
                        </div>
                    </div>
                `;
            }).join("");

            attachQueueCardEvents();
            attachQuickActionEvents();
        }

        function renderQuickActions(itemId, queueIndex, queueLength) {
            const options = buildPositionOptions(queueIndex, queueLength);

            return `
                <div class="quick-actions-row" onclick="event.stopPropagation()">
                    <button class="quick-action-btn" onclick="moveQueueItem(${itemId}, 'next')">Next song</button>
                    <button class="quick-action-btn secondary" onclick="moveQueueItem(${itemId}, 'last')">Last song</button>
                    ${
                        options.length
                            ? `<div class="quick-action-select-wrap">
                                    <select class="quick-action-select" onchange="handlePositionChange(${itemId}, this.value)">
                                        <option value="">Move to...</option>
                                        ${options.map(opt => `<option value="${opt.targetIndex}">${opt.label}</option>`).join("")}
                                    </select>
                               </div>`
                            : ``
                    }
                </div>
            `;
        }

        function buildPositionOptions(queueIndex, queueLength) {
            const options = [];
            for (let overallPos = 3; overallPos <= queueLength; overallPos++) {
                const targetIndex = overallPos - 2;
                if (targetIndex === queueIndex) continue;
                options.push({
                    label: `Position ${overallPos}`,
                    targetIndex
                });
            }
            return options;
        }

        function attachQueueCardEvents() {
            const cards = document.querySelectorAll("#queueBox .queue-item-draggable");

            cards.forEach(card => {
                const itemId = Number(card.dataset.itemId);

                card.addEventListener("click", (event) => {
                    if (event.target.closest(".quick-actions-row")) return;
                    selectedQueueItemId = (selectedQueueItemId === itemId) ? null : itemId;
                    renderQueueFromDomState();
                });
            });
        }

        function attachQuickActionEvents() {
            const actionContainers = document.querySelectorAll("#queueBox .quick-actions-row");
            const selects = document.querySelectorAll("#queueBox .quick-action-select");

            actionContainers.forEach(el => {
                ["pointerdown", "mousedown", "touchstart", "click"].forEach(evt => {
                    el.addEventListener(evt, () => lockQuickActions(5000));
                });
            });

            selects.forEach(el => {
                el.addEventListener("focus", () => lockQuickActions(10000));
                el.addEventListener("pointerdown", () => lockQuickActions(10000));
                el.addEventListener("mousedown", () => lockQuickActions(10000));
                el.addEventListener("touchstart", () => lockQuickActions(10000));
                el.addEventListener("click", () => lockQuickActions(10000));
                el.addEventListener("blur", () => {
                    setTimeout(() => {
                        quickActionLockUntil = 0;
                        refreshState();
                    }, 150);
                });
            });
        }

        async function renderQueueFromDomState() {
            const res = await fetch(`/api/rooms/${ROOM_CODE}/state`);
            const data = await res.json();
            renderQueue(data.queue || []);
        }

        async function sendReorder(orderedIds) {
            await fetch(`/api/rooms/${ROOM_CODE}/reorder_queue`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ordered_ids: orderedIds })
            });
        }

        async function moveQueueItem(itemId, mode) {
            lockQuickActions(3000);

            const queueBox = document.getElementById("queueBox");
            const orderedIds = Array.from(queueBox.querySelectorAll("[data-item-id]"))
                .map(el => Number(el.dataset.itemId));

            const fromIndex = orderedIds.indexOf(itemId);
            if (fromIndex < 0) return;

            const [moved] = orderedIds.splice(fromIndex, 1);

            if (mode === "next") {
                orderedIds.splice(0, 0, moved);
            } else if (mode === "last") {
                orderedIds.push(moved);
            }

            await sendReorder(orderedIds);
            quickActionLockUntil = 0;
            refreshState();
        }

        async function handlePositionChange(itemId, targetIndexValue) {
            lockQuickActions(3000);

            if (!targetIndexValue) return;

            const targetIndex = Number(targetIndexValue);
            if (Number.isNaN(targetIndex)) return;

            const queueBox = document.getElementById("queueBox");
            const orderedIds = Array.from(queueBox.querySelectorAll("[data-item-id]"))
                .map(el => Number(el.dataset.itemId));

            const fromIndex = orderedIds.indexOf(itemId);
            if (fromIndex < 0 || fromIndex === targetIndex) return;

            const [moved] = orderedIds.splice(fromIndex, 1);
            orderedIds.splice(targetIndex, 0, moved);

            await sendReorder(orderedIds);
            quickActionLockUntil = 0;
            refreshState();
        }

        async function playSong() {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                msg.textContent = "Please enter your singer name first";
                document.getElementById("mobile_name").focus();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/play`, { method: "POST" });
            const data = await res.json();

            if (!res.ok) {
                msg.textContent = data.error || "Play failed";
                return;
            }

            msg.textContent = "Play command sent";
            refreshState();
        }

        async function skipSong() {
            const msg = document.getElementById("msg");
            const name = saveSingerName();

            if (!name) {
                msg.textContent = "Please enter your singer name first";
                document.getElementById("mobile_name").focus();
                return;
            }

            const res = await fetch(`/api/rooms/${ROOM_CODE}/skip`, { method: "POST" });
            const data = await res.json();

            if (!res.ok) {
                msg.textContent = data.error || "Skip failed";
                return;
            }

            msg.textContent = data.message || "Skipped";
            refreshState();
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeJs(str) {
            return String(str).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
        }

        loadSingerName();
        setInterval(refreshState, 1500);
        refreshState();
    </script>
</body>
</html>
