services:
  - type: web
    name: youke-karaoke
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ROOM_MAX_ACTIVE
        value: 300
      - key: ROOM_TTL_SECONDS
        value: 21600
